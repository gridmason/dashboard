server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-routed SPA: unknown paths (/p/:pageType/:entityId) fall back to
    # index.html so the router can resolve them.
    location / {
        # The enforced production Content-Security-Policy (SPEC §3, FR-13). This is
        # the strict self-only base emitted by buildProductionCspHeader({}) — the
        # single source of truth in src/security/production-csp.ts, pinned identical
        # by src/security/nginx-csp.test.ts so this string cannot drift. A deployment
        # that federates a registry appends its trusted CDN origin(s) to `script-src`
        # + `connect-src`, and each acknowledged-sideload origin to `script-src`
        # (SPEC §4) — every such origin stays visible here in the served config. No
        # widget capability ever widens it: a `net:<host>` call is proxied through the
        # same-origin /api/scoped-fetch endpoint, so `connect-src` needs no third-party host.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; frame-src 'none'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets are safe to cache immutably.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
