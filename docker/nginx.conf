server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-routed SPA: unknown paths (/p/:pageType/:entityId) fall back to
    # index.html so the router can resolve them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets are safe to cache immutably.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
