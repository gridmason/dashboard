name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'epic/**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # Release artifact (a): the static bundle. Also the type-check gate.
  # CI fails here if the bundle build fails.
  static-bundle:
    name: Build static bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: static-bundle
          path: dist
          if-no-files-found: error

  # Release artifact (b): the deployable app image. Built but never pushed.
  # CI fails here if the image build fails.
  app-image:
    name: Build app image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: gridmason-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Full Playwright e2e matrix against the built bundle (FR-16, SPEC §7): boot,
  # add-widget gating, governance resolution, error boundary, telemetry +
  # auto-degrade, canvas-interactive perf budget, and the sideload gate. `npm run
  # e2e` runs both Playwright projects (production preview + dev-server sideload),
  # so this one job is the whole matrix.
  e2e:
    name: E2E matrix (boot, gating, governance, boundary, auto-degrade, sideload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  # Demo API service (FR-5, FR-6): type-check the server and run its suites. The
  # api tests boot the service on an ephemeral port, so this job also proves the
  # service starts in CI. Vitest-only — no browser needed.
  api:
    name: Demo API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run api:typecheck
      - run: npm run api:test

  # Lighthouse CI NFR gate over the built bundle (FR-16, SPEC §7): blocking budget
  # assertions (accessibility ≥ 0.95 — WCAG 2.1 AA; performance ≥ 0.85), 3 runs
  # for a stable median (lighthouserc.json). The precise "p95 canvas interactive
  # < 300 ms after data" NFR is enforced by the Playwright perf spec (e2e/perf.spec.ts),
  # which measures the app's own canvas-interactive telemetry rather than
  # Lighthouse's simulated throttling.
  lighthouse:
    name: Lighthouse CI (NFR gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lighthouse
